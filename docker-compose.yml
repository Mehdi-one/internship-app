services:
  postgres:
    image: postgres:16
    container_name: internship-app-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: internship_app
      POSTGRES_USER: internship_user
      POSTGRES_PASSWORD: internship_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: internship-app-keycloak
    command: start-dev
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

volumes:
  postgres_data:
