<form #fuelLogForm="ngForm" class="form-grid" novalidate (ngSubmit)="submit(fuelLogForm)">
  <label [class.invalid]="fuelLogForm.submitted && date.invalid">
    Date <span class="required-marker">*</span>
    <input #date="ngModel" name="date" type="date" required [(ngModel)]="fuelLog.date" />
    @if (fuelLogForm.submitted && date.invalid) {
      <span class="field-error">La date est obligatoire.</span>
    }
  </label>

  <label [class.invalid]="fuelLogForm.submitted && liters.invalid">
    Litres <span class="required-marker">*</span>
    <input #liters="ngModel" name="liters" type="number" min="0.01" step="0.01" required [(ngModel)]="fuelLog.liters" />
    @if (fuelLogForm.submitted && liters.invalid) {
      <span class="field-error">Le nombre de litres doit être supérieur à 0.</span>
    }
  </label>

  <label [class.invalid]="fuelLogForm.submitted && costPerLiter.invalid">
    Prix par litre <span class="required-marker">*</span>
    <input #costPerLiter="ngModel" name="costPerLiter" type="number" min="0.01" step="0.01" required [(ngModel)]="fuelLog.costPerLiter" />
    @if (fuelLogForm.submitted && costPerLiter.invalid) {
      <span class="field-error">Le prix par litre doit être supérieur à 0.</span>
    }
  </label>

  <label>
    Km ou heures au compteur
    <input name="mileageOrHours" type="number" min="0" step="0.01" [(ngModel)]="fuelLog.mileageOrHours" />
  </label>

  <label>
    Total calculé
    <input [value]="calculatedTotal + ' DHS'" readonly />
  </label>

  <label class="full-row">
    Notes
    <textarea name="notes" rows="2" [(ngModel)]="fuelLog.notes"></textarea>
  </label>

  <div class="form-actions full-row">
    <button type="submit">Enregistrer le plein</button>
  </div>
</form>
