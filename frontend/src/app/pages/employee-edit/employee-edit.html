<section class="page-header">
  <div>
    <h1>Modifier le salarié</h1>
    <p>Mettre à jour ses informations et son coût horaire chargé.</p>
  </div>
  <a [routerLink]="['/employees', employeeId]" class="button-link secondary">Retour</a>
</section>

@if (message) {
  <p class="notice">{{ message }}</p>
}

@if (employee) {
  <app-employee-form
    [initialEmployee]="employee"
    [editMode]="true"
    submitLabel="Enregistrer le salarié"
    (employeeSubmitted)="updateEmployee($event)">
  </app-employee-form>
}
