<section class="page-header">
  <div>
    <h1>Modifier le marche</h1>
    <p>Mettre a jour les informations principales du CDC pour ce marche.</p>
  </div>
  <a [routerLink]="['/projects', projectId]" class="button-link secondary">Retour</a>
</section>

@if (message) {
  <p class="notice">{{ message }}</p>
}

<form #projectForm="ngForm" class="panel form-grid" novalidate (ngSubmit)="submit(projectForm)">
  <label [class.invalid]="projectForm.submitted && reference.invalid">
    Reference <span class="required-marker">*</span>
    <input #reference="ngModel" name="reference" required [(ngModel)]="project.reference" />
    @if (projectForm.submitted && reference.invalid) {
      <span class="field-error">La reference est obligatoire.</span>
    }
  </label>

  <label [class.invalid]="projectForm.submitted && title.invalid">
    Intitule / objet <span class="required-marker">*</span>
    <input #title="ngModel" name="title" required [(ngModel)]="project.title" />
    @if (projectForm.submitted && title.invalid) {
      <span class="field-error">L'intitule ou l'objet est obligatoire.</span>
    }
  </label>

  <label [class.invalid]="projectForm.submitted && contractingAuthority.invalid">
    Maitre d'ouvrage <span class="required-marker">*</span>
    <input #contractingAuthority="ngModel" name="contractingAuthority" list="contracting-authorities" required [(ngModel)]="project.contractingAuthority" />
    <datalist id="contracting-authorities">
      @for (authority of contractingAuthorities; track authority) {
        <option [value]="authority"></option>
      }
    </datalist>
    @if (projectForm.submitted && contractingAuthority.invalid) {
      <span class="field-error">Le maitre d'ouvrage est obligatoire.</span>
    }
  </label>

  <label>
    Type de marche <span class="required-marker">*</span>
    <select name="projectType" required [(ngModel)]="project.projectType">
      <option value="WORKS">Travaux</option>
      <option value="SUPPLIES">Fournitures</option>
      <option value="SERVICES">Services</option>
    </select>
  </label>

  <label [class.invalid]="projectForm.submitted && awardedAmountHT.invalid">
    Montant adjuge HT (DHS) <span class="required-marker">*</span>
    <input #awardedAmountHT="ngModel" name="awardedAmountHT" type="number" min="0.01" step="0.01" required [(ngModel)]="project.awardedAmountHT" />
    @if (projectForm.submitted && awardedAmountHT.invalid) {
      <span class="field-error">Le montant adjuge HT doit etre superieur a 0.</span>
    }
  </label>

  <label [class.invalid]="projectForm.submitted && tvaRate.invalid">
    Taux TVA <span class="required-marker">*</span>
    <select #tvaRate="ngModel" name="tvaRate" required [(ngModel)]="project.tvaRate">
      <option [ngValue]="0">0%</option>
      <option [ngValue]="7">7%</option>
      <option [ngValue]="10">10%</option>
      <option [ngValue]="14">14%</option>
      <option [ngValue]="20">20%</option>
    </select>
    @if (projectForm.submitted && tvaRate.invalid) {
      <span class="field-error">Le taux TVA est obligatoire.</span>
    }
  </label>

  <label [class.invalid]="projectForm.submitted && estimatedDryCost.invalid">
    Budget previsionnel / debourse sec estime (DHS) <span class="required-marker">*</span>
    <input #estimatedDryCost="ngModel" name="estimatedDryCost" type="number" min="0.01" step="0.01" required [(ngModel)]="project.estimatedDryCost" />
    @if (projectForm.submitted && estimatedDryCost.invalid) {
      <span class="field-error">Le debourse sec estime doit etre superieur a 0.</span>
    }
  </label>

  <label>
    Date de notification / OS
    <input name="notificationOrderDate" type="date" [(ngModel)]="project.notificationOrderDate" />
  </label>

  <label>
    Delai d'execution (jours)
    <input name="executionDelayDays" type="number" min="1" step="1" [(ngModel)]="project.executionDelayDays" />
  </label>

  <label>
    Date de fin previsionnelle
    <input type="date" [value]="plannedEndDate" readonly />
  </label>

  <label [class.invalid]="projectForm.submitted && responsibleUserReference.invalid">
    Responsable (conducteur) - reference utilisateur <span class="required-marker">*</span>
    <input #responsibleUserReference="ngModel" name="responsibleUserReference" placeholder="Ex. identifiant Keycloak" required [(ngModel)]="project.responsibleUserReference" />
    @if (projectForm.submitted && responsibleUserReference.invalid) {
      <span class="field-error">La reference utilisateur du responsable est obligatoire.</span>
    }
  </label>

  <label>
    Statut
    <select name="status" [(ngModel)]="project.status">
      <option value="PROSPECT">Prospect</option>
      <option value="IN_PROGRESS">En cours</option>
      <option value="SUSPENDED">Suspendu</option>
      <option value="RECEIVED">Receptionne</option>
      <option value="CLOSED">Cloture</option>
    </select>
  </label>

  <div class="form-actions full-row">
    <button type="submit">Enregistrer le marche</button>
  </div>
</form>
